<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VTT Audio Chat</title>
  <script crossorigin src="https://unpkg.com/@daily-co/daily-js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d0f;
      color: #e8e4da;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }
    h1 { font-size: 20px; color: #c9a84c; margin-bottom: 24px; }

    .setup-panel {
      background: #1a1a1f;
      border: 1px solid #2a2a33;
      border-radius: 8px;
      padding: 24px;
      width: 400px;
      max-width: 100%;
    }
    .setup-panel label {
      display: block;
      font-size: 13px;
      color: #9a9689;
      margin-bottom: 4px;
    }
    .setup-panel input {
      width: 100%;
      padding: 8px 12px;
      background: #141418;
      border: 1px solid #2a2a33;
      border-radius: 4px;
      color: #e8e4da;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .setup-panel input:focus { outline: none; border-color: #c9a84c; }
    .setup-panel button {
      width: 100%;
      padding: 10px;
      background: #c9a84c;
      color: #0d0d0f;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .setup-panel button:hover { background: #dbb85a; }
    .setup-panel button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #b44040; font-size: 13px; margin-top: 8px; }
    .info { color: #9a9689; font-size: 12px; margin-top: 8px; }

    /* ── Call UI ── */
    .call-container {
      display: none;
      width: 100%;
      max-width: 900px;
      flex-direction: column;
      gap: 16px;
    }
    .call-container.active { display: flex; }

    .room-info {
      background: #1a1a1f;
      border: 1px solid #2a2a33;
      border-radius: 6px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }
    .room-info .room-url { color: #c9a84c; cursor: pointer; }

    .participants {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .participant {
      background: #1a1a1f;
      border: 1px solid #2a2a33;
      border-radius: 8px;
      padding: 16px;
      min-width: 160px;
      text-align: center;
    }
    .participant .avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: #22222a;
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .participant .name { font-size: 14px; margin-bottom: 4px; }
    .participant .status { font-size: 11px; color: #9a9689; }
    .participant.speaking { border-color: #4a8c5c; }
    .participant.muted .avatar { opacity: 0.5; }

    .controls-bar {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 16px;
    }
    .ctrl-btn {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 1px solid #2a2a33;
      background: #1a1a1f;
      color: #e8e4da;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ctrl-btn:hover { border-color: #c9a84c; }
    .ctrl-btn.active { background: #c9a84c; color: #0d0d0f; border-color: #c9a84c; }
    .ctrl-btn.leave { background: #b44040; border-color: #b44040; }
    .ctrl-btn.leave:hover { background: #c55050; }
  </style>
</head>
<body>

<h1>🎙️ VTT Audio Chat</h1>

<!-- Setup -->
<div class="setup-panel" id="setup">
  <label>Your Name</label>
  <input id="user-name" value="" placeholder="Enter your name">
  <label>Room (leave empty to create new)</label>
  <input id="room-url" placeholder="https://your-domain.daily.co/room-name">
  <button id="join-btn" onclick="joinOrCreate()">Create & Join Room</button>
  <div class="error" id="error"></div>
  <div class="info">
    Requires DAILY_API_KEY in .env — get a free key at
    <a href="https://dashboard.daily.co/" style="color:#c9a84c;">dashboard.daily.co</a>
  </div>
</div>

<!-- Call -->
<div class="call-container" id="call-container">
  <div class="room-info">
    <span>Room: <span class="room-url" id="room-url-display" onclick="copyRoomUrl()"></span></span>
    <span id="participant-count">0 participants</span>
  </div>
  <div class="participants" id="participants"></div>
  <div class="controls-bar">
    <button class="ctrl-btn" id="mic-btn" onclick="toggleMic()" title="Toggle microphone">🎤</button>
    <button class="ctrl-btn leave" onclick="leaveCall()" title="Leave call">📞</button>
  </div>
</div>

<script>
  let callObject = null;
  let currentRoomUrl = '';

  const roomInput = document.getElementById('room-url');
  roomInput.addEventListener('input', () => {
    document.getElementById('join-btn').textContent = roomInput.value.trim() ? 'Join Room' : 'Create & Join Room';
  });

  async function joinOrCreate() {
    const errorEl = document.getElementById('error');
    const btn = document.getElementById('join-btn');
    errorEl.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Connecting...';

    try {
      let roomUrl = roomInput.value.trim();

      // If no URL, create a new room
      if (!roomUrl) {
        const res = await fetch('/api/room', { method: 'POST' });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        roomUrl = data.url;
      }

      currentRoomUrl = roomUrl;
      const userName = document.getElementById('user-name').value.trim() || 'Player';

      // Create Daily call
      callObject = DailyIframe.createCallObject({
        audioSource: true,
        videoSource: false, // Audio only for VTT
      });

      callObject.on('joined-meeting', handleJoined);
      callObject.on('participant-joined', handleParticipantUpdate);
      callObject.on('participant-left', handleParticipantUpdate);
      callObject.on('participant-updated', handleParticipantUpdate);
      callObject.on('error', (e) => { errorEl.textContent = e.errorMsg; });

      await callObject.join({ url: roomUrl, userName });
    } catch (err) {
      errorEl.textContent = err.message;
      btn.disabled = false;
      btn.textContent = roomInput.value.trim() ? 'Join Room' : 'Create & Join Room';
    }
  }

  function handleJoined() {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('call-container').classList.add('active');
    document.getElementById('room-url-display').textContent = currentRoomUrl;
    updateParticipants();
  }

  function handleParticipantUpdate() {
    updateParticipants();
  }

  function updateParticipants() {
    if (!callObject) return;
    const participants = callObject.participants();
    const container = document.getElementById('participants');
    const entries = Object.values(participants);

    document.getElementById('participant-count').textContent = `${entries.length} participant${entries.length !== 1 ? 's' : ''}`;

    container.innerHTML = entries.map(p => {
      const isMuted = !p.audio;
      const initial = (p.user_name || 'P')[0].toUpperCase();
      return `
        <div class="participant ${isMuted ? 'muted' : ''}">
          <div class="avatar">${initial}</div>
          <div class="name">${p.user_name || 'Unknown'}${p.local ? ' (you)' : ''}</div>
          <div class="status">${isMuted ? '🔇 Muted' : '🔊 Active'}</div>
        </div>
      `;
    }).join('');

    // Update mic button state
    const local = participants.local;
    const micBtn = document.getElementById('mic-btn');
    if (local && !local.audio) {
      micBtn.classList.remove('active');
      micBtn.textContent = '🔇';
    } else {
      micBtn.classList.add('active');
      micBtn.textContent = '🎤';
    }
  }

  function toggleMic() {
    if (!callObject) return;
    const local = callObject.participants().local;
    callObject.setLocalAudio(!local.audio);
  }

  async function leaveCall() {
    if (callObject) {
      await callObject.leave();
      callObject.destroy();
      callObject = null;
    }
    document.getElementById('setup').style.display = '';
    document.getElementById('call-container').classList.remove('active');
    document.getElementById('join-btn').disabled = false;
    document.getElementById('join-btn').textContent = 'Create & Join Room';
  }

  function copyRoomUrl() {
    navigator.clipboard.writeText(currentRoomUrl).then(() => {
      const el = document.getElementById('room-url-display');
      const orig = el.textContent;
      el.textContent = 'Copied!';
      setTimeout(() => el.textContent = orig, 1500);
    });
  }
</script>
</body>
</html>
